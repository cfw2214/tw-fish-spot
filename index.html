<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎣 北台灣海釣天氣助理</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0a1628; --bg2:#0f2040; --card:#132545; --card2:#1a3060;
      --accent:#00b4d8; --accent2:#0077b6; --gold:#f4a261; --green:#2ec4b6; --red:#e63946;
      --text:#e0f0ff; --text2:#8ab4cc; --border:#1e3a5f; --radius:12px;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Noto Sans TC',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    header { background:linear-gradient(135deg,var(--bg2),var(--accent2)); padding:14px 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:2px solid var(--accent); position:sticky; top:0; z-index:100; }
    header h1 { font-size:1.1rem; font-weight:700; letter-spacing:1px; }
    header h1 span { color:var(--accent); }
    #hamburger { display:none; background:none; border:none; color:var(--text); font-size:1.5rem; cursor:pointer; }
    .main-wrap { display:flex; max-width:1300px; margin:0 auto; }
    #sidebar { width:270px; min-width:270px; background:var(--bg2); border-right:1px solid var(--border); padding:20px 16px; display:flex; flex-direction:column; gap:20px; min-height:calc(100vh - 60px); }
    .sidebar-section h3 { font-size:.75rem; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:10px; border-bottom:1px solid var(--border); padding-bottom:6px; }
    #fav-list { list-style:none; display:flex; flex-direction:column; gap:6px; }
    #fav-list li { background:var(--card); border-radius:8px; padding:8px 10px; font-size:.82rem; display:flex; align-items:center; justify-content:space-between; border:1px solid var(--border); }
    .fav-area { color:var(--text2); font-size:.72rem; margin-left:4px; }
    .fav-del { color:var(--red); background:none; border:none; cursor:pointer; font-size:.9rem; }
    .fav-empty { color:var(--text2); font-size:.8rem; padding:8px 0; }
    #main-content { flex:1; padding:20px; overflow:hidden; }
    .filter-box { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; margin-bottom:24px; }
    .filter-box h2 { font-size:.9rem; color:var(--accent); margin-bottom:14px; letter-spacing:1px; }
    .filter-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .filter-group { display:flex; flex-direction:column; gap:5px; }
    .filter-group label { font-size:.78rem; color:var(--text2); }
    .filter-group input,.filter-group select { background:var(--card); border:1px solid var(--border); border-radius:8px; color:var(--text); padding:8px 10px; font-size:.85rem; font-family:inherit; outline:none; width:100%; }
    .filter-row-full { grid-column:1 / -1; }
    .chip { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:5px 12px; font-size:.78rem; cursor:pointer; transition:all .2s; user-select:none; }
    .chip.active { background:var(--accent2); border-color:var(--accent); color:#fff; }
    .area-chips,.type-chips { display:flex; flex-wrap:wrap; gap:6px; margin-top:4px; }
    .btn-search { background:linear-gradient(135deg,var(--accent2),var(--accent)); color:#fff; border:none; border-radius:25px; padding:10px 30px; font-size:.95rem; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:8px; }
    .btn-mini { background:none; border:1px solid var(--border); color:var(--text2); border-radius:8px; padding:5px 12px; font-size:.75rem; cursor:pointer; }
    .btn-mini.active { border-color:var(--gold); color:var(--gold); }
    #recommend-section { margin-bottom:28px; }
    .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .section-title { font-size:1rem; font-weight:700; display:flex; align-items:center; gap:8px; }
    .badge-new { background:var(--gold); color:#1a1a2e; font-size:.65rem; font-weight:700; padding:2px 8px; border-radius:10px; }
    .wave-alert { background:rgba(230,57,70,.12); border:1px solid rgba(230,57,70,.4); border-radius:10px; padding:10px 14px; margin-bottom:12px; font-size:.82rem; color:#ff8fa3; display:flex; align-items:center; gap:8px; }
    #recommend-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
    .rec-card,.spot-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); }
    .rec-card { padding:14px; position:relative; overflow:hidden; }
    .rec-card::before { content:''; position:absolute; top:0; left:0; width:100%; height:3px; background:linear-gradient(90deg,var(--accent2),var(--accent)); }
    .rec-card.type-野場::before { background:linear-gradient(90deg,#c77b30,var(--gold)); }
    .rec-card.type-肉粽::before { background:linear-gradient(90deg,#1d8a82,var(--green)); }
    .rec-rank { position:absolute; top:12px; right:12px; font-size:1.4rem; opacity:.6; }
    .rec-name { font-size:.95rem; font-weight:700; margin-bottom:6px; padding-right:30px; }
    .rec-meta,.card-meta { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:10px; }
    .badge { font-size:.65rem; padding:2px 7px; border-radius:10px; font-weight:700; }
    .badge-野場 { background:rgba(244,162,97,.2); color:var(--gold); border:1px solid rgba(244,162,97,.4); }
    .badge-肉粽 { background:rgba(46,196,182,.2); color:var(--green); border:1px solid rgba(46,196,182,.4); }
    .badge-area { background:rgba(0,180,216,.15); color:var(--accent); border:1px solid rgba(0,180,216,.3); }
    .suitability { font-size:.72rem; padding:3px 10px; border-radius:10px; font-weight:700; }
    .suit-great { background:rgba(46,196,182,.2); color:var(--green); border:1px solid rgba(46,196,182,.4); }
    .suit-ok { background:rgba(244,162,97,.2); color:var(--gold); border:1px solid rgba(244,162,97,.4); }
    .suit-bad { background:rgba(230,57,70,.2); color:var(--red); border:1px solid rgba(230,57,70,.4); }
    .score-bar { height:4px; background:var(--border); border-radius:2px; overflow:hidden; margin-bottom:10px; }
    .score-bar-fill { height:100%; border-radius:2px; }
    .rec-stats { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
    .rec-stat { font-size:.78rem; color:var(--text2); }
    .rec-stat strong { color:var(--text); }
    .rec-note,.result-note,.wind-note { font-size:.72rem; color:var(--text2); margin-bottom:10px; }
    .rec-footer,.card-footer { display:flex; justify-content:space-between; align-items:center; }
    #results-section { display:none; }
    .results-divider { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
    .results-divider h2 { font-size:.95rem; font-weight:700; white-space:nowrap; }
    .results-divider::after { content:''; flex:1; height:1px; background:var(--border); }
    #results-toolbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:8px; }
    #results-count { font-size:.82rem; color:var(--text2); }
    #sort-select { background:var(--card); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:5px 10px; font-size:.78rem; }
    #results-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; }
    .spot-card { padding:16px; position:relative; overflow:hidden; }
    .spot-card::before { content:''; position:absolute; top:0; left:0; width:4px; height:100%; background:var(--accent); }
    .spot-card.type-野場::before { background:var(--gold); }
    .spot-card.type-肉粽::before { background:var(--green); }
    .card-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:10px; }
    .card-title { font-size:1rem; font-weight:700; }
    .stars { font-size:1.1rem; letter-spacing:-2px; }
    .weather-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:10px 0; }
    .weather-item { background:var(--card2); border-radius:8px; padding:8px; text-align:center; }
    .weather-label { font-size:.65rem; color:var(--text2); margin-bottom:3px; }
    .weather-value { font-size:.88rem; font-weight:700; }
    .tide-row { background:var(--card2); border-radius:8px; padding:8px 10px; display:flex; gap:10px; flex-wrap:wrap; margin-bottom:8px; }
    .tide-item { font-size:.78rem; }
    .tide-item span { color:var(--text2); }
    .loading-placeholder { text-align:center; color:var(--text2); padding:50px 20px; grid-column:1/-1; }
    .spinner { display:inline-block; width:26px; height:26px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; margin:12px auto; }
    @keyframes spin { to { transform:rotate(360deg); } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    @media(max-width:768px){ #hamburger{display:block;} #sidebar{position:fixed;left:-290px;top:0;height:100vh;z-index:150;transition:left .3s;padding-top:70px;} #sidebar.open{left:0;} .filter-grid{grid-template-columns:1fr;} #recommend-grid,#results-grid{grid-template-columns:1fr;} }
  </style>
</head>
<body>
  <header>
    <button id="hamburger" onclick="toggleSidebar()">☰</button>
    <h1>🎣 北台灣<span>海釣天氣</span>助理</h1>
    <button class="btn-mini" onclick="toggleSidebar()">⭐ 最愛</button>
  </header>
  <div id="sb-overlay" style="display:none;position:fixed;inset:0;z-index:140;background:rgba(0,0,0,.5)" onclick="toggleSidebar()"></div>
  <div class="main-wrap">
    <aside id="sidebar">
      <div class="sidebar-section">
        <h3>⭐ 我的最愛釣點</h3>
        <ul id="fav-list"><li class="fav-empty">尚未收藏任何釣點</li></ul>
        <div style="font-size:.7rem;color:var(--text2);margin-top:8px">最多收藏 10 個</div>
      </div>
      <div class="sidebar-section">
        <h3>📊 釣點統計</h3>
        <div style="font-size:.78rem;color:var(--text2)">已載入 <span id="spots-num" style="color:var(--accent);font-weight:700">0</span> 個釣點</div>
      </div>
    </aside>
    <main id="main-content">
      <div class="filter-box">
        <h2>🔍 篩選條件</h2>
        <div class="filter-grid">
          <div class="filter-group">
            <label>📅 作釣日期</label>
            <input type="date" id="input-date" onchange="syncEndDate()">
          </div>
          <div class="filter-group">
            <label>🕐 作釣開始時間（24小時）</label>
            <select id="input-time-start"></select>
          </div>
          <div class="filter-group">
            <label>📅 結束日期（跨夜可修改）</label>
            <input type="date" id="input-date-end">
          </div>
          <div class="filter-group">
            <label>🕛 預計結束時間（24小時）</label>
            <select id="input-time-end"></select>
          </div>
          <div class="filter-group filter-row-full">
            <label>📍 大區域（可多選）</label>
            <div class="area-chips" id="area-chips">
              <div class="chip active" data-area="all">全部北台灣</div>
              <div class="chip" data-area="基隆區">基隆區</div>
              <div class="chip" data-area="東北角區">東北角區</div>
              <div class="chip" data-area="北海岸區">北海岸區</div>
            </div>
          </div>
          <div class="filter-group filter-row-full">
            <label>🎣 釣點類型</label>
            <div class="type-chips">
              <div class="chip active" data-type="all">全部</div>
              <div class="chip" data-type="野場">🏔️ 野場</div>
              <div class="chip" data-type="肉粽">⚓ 肉粽（港區）</div>
            </div>
          </div>
          <div class="filter-group filter-row-full" style="flex-direction:row;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
            <button class="btn-search" onclick="searchSpots()">🎣 海釣點推薦</button>
            <label style="font-size:.82rem;color:var(--text2);display:flex;align-items:center;gap:8px;cursor:pointer;">
              <input type="checkbox" id="fav-only" style="accent-color:var(--gold);width:16px;height:16px;cursor:pointer;"> 只看我的最愛
            </label>
          </div>
        </div>
      </div>
      <section id="recommend-section">
        <div class="section-header">
          <div class="section-title">🎯 今日推薦釣點 <span class="badge-new">LIVE</span></div>
          <button class="btn-mini" onclick="refreshRecommendations()">🔄 換一批</button>
        </div>
        <div id="wave-alert" class="wave-alert" style="display:none;">🌊 <span id="wave-message"></span></div>
        <div id="recommend-grid"><div class="loading-placeholder"><div class="spinner"></div><div>分析今日海況中...</div></div></div>
      </section>
      <section id="results-section">
        <div class="results-divider"><h2>📋 全部合適釣點</h2></div>
        <div id="results-toolbar">
          <div id="results-count"></div>
          <select id="sort-select" onchange="sortResults()">
            <option value="score">依適合度排序</option>
            <option value="wave">依浪高排序</option>
            <option value="name">依名稱排序</option>
          </select>
        </div>
        <div id="results-grid"></div>
      </section>
    </main>
  </div>
  <footer style="text-align:center;padding:18px 20px;margin-top:40px;border-top:1px solid var(--border);color:var(--text2);font-size:.75rem;background:var(--bg2)">北台灣海釣天氣助理｜版本 V0.2.2</footer>
  <script>
    const CWA_KEY = 'CWA-668A5759-9FC3-4C75-91A3-F84C27565A7A';
    const DEFAULT_SPOTS = [];
    let SPOTS = [];
    let FAVS = JSON.parse(localStorage.getItem('favSpots') || '[]');
    let currentResults = [];
    let recommendationPool = [];
    let recommendationPage = 0;
    const RECOMMEND_PER_PAGE = 9;
    let highWaveMode = false;

    function getLocalDateString() {
      const now = new Date();
      const tzOffset = now.getTimezoneOffset() * 60000;
      return new Date(now.getTime() - tzOffset).toISOString().split('T')[0];
    }

    function fillHourOptions(selectId, defaultHour) {
      const el = document.getElementById(selectId);
      if (!el) return;
      if (el.options.length > 0) return;
      for (let i = 0; i < 24; i++) {
        const opt = document.createElement('option');
        opt.value = String(i).padStart(2, '0');
        opt.textContent = String(i).padStart(2, '0') + ':00';
        if (i === defaultHour) opt.selected = true;
        el.appendChild(opt);
      }
    }

    function syncEndDate() {
      const start = document.getElementById('input-date');
      const end = document.getElementById('input-date-end');
      if (!start || !end) return;
      if (!end.value || end.value < start.value) end.value = start.value;
    }

    function initAreaChips() {
      const chips = document.querySelectorAll('#area-chips .chip');
      const allChip = document.querySelector('#area-chips .chip[data-area="all"]');
      chips.forEach(chip => {
        chip.onclick = () => {
          if (chip.dataset.area === 'all') {
            chips.forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
          } else {
            if (allChip) allChip.classList.remove('active');
            chip.classList.toggle('active');
            const anyActive = [...document.querySelectorAll('#area-chips .chip:not([data-area="all"])')].some(c => c.classList.contains('active'));
            if (!anyActive && allChip) allChip.classList.add('active');
          }
        };
      });
    }

    function initTypeChips() {
      const chips = document.querySelectorAll('.type-chips .chip');
      chips.forEach(chip => {
        chip.onclick = () => {
          chips.forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
        };
      });
    }

    function toggleSidebar() {
      const sb = document.getElementById('sidebar');
      const ov = document.getElementById('sb-overlay');
      if (!sb || !ov) return;
      sb.classList.toggle('open');
      ov.style.display = sb.classList.contains('open') ? 'block' : 'none';
    }

    function openMap(lat, lng) { window.open(`https://www.google.com/maps?q=${lat},${lng}`, '_blank'); }
    function showToast(msg, isError = false) {
      const t = document.createElement('div');
      t.textContent = msg;
      t.style.cssText = `position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:${isError ? 'var(--red)' : 'var(--accent2)'};color:#fff;padding:10px 20px;border-radius:20px;font-size:.85rem;z-index:999;animation:fadeUp .3s ease`;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2500);
    }
    function degToDir(deg) { return ['北','東北','東','東南','南','西南','西','西北'][Math.round(deg / 45) % 8]; }
    function msToBeaufort(ms) { const t = [0.3,1.6,3.4,5.5,8,10.8,13.9,17.2]; const i = t.findIndex(v => ms < v); return i === -1 ? 8 : i; }
    function getSuitabilityLabel(score) {
      if (score >= 4) return '<span class="suitability suit-great">✅ 適合出釣</span>';
      if (score >= 3) return '<span class="suitability suit-ok">⚠️ 尚可</span>';
      return '<span class="suitability suit-bad">❌ 不建議</span>';
    }
    function calcScore(spot, wave, beaufort, windDir) {
      let s = 5;
      const max = spot.max_wave_height === 99 ? 999 : spot.max_wave_height;
      if (wave > max) s -= 3; else if (wave > max * 0.8) s -= 1;
      if (beaufort > 5) s -= 3; else if (beaufort > 3) s -= 1;
      if (windDir && spot.bad_wind_directions?.includes(windDir)) s -= 1;
      if (windDir && spot.good_wind_directions?.includes(windDir)) s += 1;
      return Math.max(1, Math.min(5, s));
    }
    function mockTides() {
      const r = () => String(Math.floor(Math.random() * 59)).padStart(2, '0');
      return [
        { time:`06:${r()}`, type:'低潮', height:(Math.random() * .4 + .2).toFixed(1) },
        { time:`12:${r()}`, type:'高潮', height:(Math.random() * .6 + 1.4).toFixed(1) },
        { time:`18:${r()}`, type:'低潮', height:(Math.random() * .4 + .2).toFixed(1) }
      ];
    }
    async function getWeather(spot, date, startHour, endHour) {
      try {
        const [marineRes, weatherRes] = await Promise.all([
          fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=${spot.lat}&longitude=${spot.lng}&hourly=wave_height,wave_direction&timezone=Asia%2FTaipei&start_date=${date}&end_date=${date}`),
          fetch(`https://api.open-meteo.com/v1/forecast?latitude=${spot.lat}&longitude=${spot.lng}&hourly=temperature_2m,precipitation_probability,windspeed_10m,winddirection_10m&timezone=Asia%2FTaipei&start_date=${date}&end_date=${date}`)
        ]);
        const m = await marineRes.json();
        const w = await weatherRes.json();
        const h = startHour;
        const wave = parseFloat(((m.hourly?.wave_height?.[h] ?? 0.8)).toFixed(1));
        const wsKm = w.hourly?.windspeed_10m?.[h] ?? 0;
        const ws = parseFloat((wsKm / 3.6).toFixed(1));
        const wdDeg = w.hourly?.winddirection_10m?.[h] ?? 0;
        const temp = Math.round(w.hourly?.temperature_2m?.[h] ?? 22);
        const rain = Math.round(w.hourly?.precipitation_probability?.[h] ?? 0);
        let tides = mockTides();
        let tideType = '';
        try {
          const tr = await fetch(`https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-A0021-001?Authorization=${CWA_KEY}&format=JSON&Date=${date}`);
          const td = await tr.json();
          const recs = td?.records?.TideForecasts;
          if (recs?.length) {
            const daily = recs[0]?.Location?.TimePeriods?.Daily?.find(d => d.Date === date);
            if (daily?.TideType) tideType = daily.TideType;
            if (daily?.HourlyTides?.length) {
              const winS = Math.max(0, startHour - 3), winE = Math.min(23, endHour + 3), turning = [];
              for (let i = 1; i < daily.HourlyTides.length; i++) {
                const cur = daily.HourlyTides[i], prev = daily.HourlyTides[i - 1];
                const th = parseInt(cur.DateTime.split('T')[1], 10);
                if (cur.TideType !== prev.TideType && th >= winS && th <= winE) {
                  turning.push({ time:cur.DateTime.split('T')[1].substring(0,5), type:cur.TideType === 'H' ? '高潮' : '低潮', height:parseFloat(cur.TideHeights?.AboveChartDatum ?? 0).toFixed(1) });
                }
              }
              if (turning.length) tides = turning.slice(0, 3);
            }
          }
        } catch (e) {}
        const wd = degToDir(wdDeg);
        return { spot, wave, ws, wd, temp, rain, tides, tideType, score:calcScore(spot, wave, msToBeaufort(ws), wd), source:'live' };
      } catch (e) {
        return { spot, wave:0.8, ws:2.1, wd:'北', temp:22, rain:0, tides:mockTides(), tideType:'中潮', score:4, source:'demo' };
      }
    }
    function recommendationCard(r, rank) {
      const isFav = FAVS.find(f => f.name === r.spot.name);
      const max = r.spot.max_wave_height === 99 ? 999 : r.spot.max_wave_height;
      const waveColor = r.wave > max ? 'color:var(--red)' : r.wave > 1 ? 'color:var(--gold)' : 'color:var(--green)';
      const barColor = r.score >= 4 ? 'var(--green)' : r.score >= 3 ? 'var(--gold)' : 'var(--red)';
      const tide0 = r.tides[0] || {};
      return `<div class="rec-card type-${r.spot.type}"><div class="rec-rank">${rank}</div><div class="rec-name">${r.spot.name}</div><div class="rec-meta"><span class="badge badge-${r.spot.type}">${r.spot.type}</span><span class="badge badge-area">📍 ${r.spot.area}</span>${getSuitabilityLabel(r.score)}</div><div class="score-bar"><div class="score-bar-fill" style="width:${r.score * 20}%;background:${barColor}"></div></div><div class="rec-stats">${r.tideType ? `<div class="rec-stat">🌙 <strong>${r.tideType}</strong></div>` : ''}<div class="rec-stat">🌊 <strong style="${waveColor}">${r.wave}m</strong></div><div class="rec-stat">🌬️ <strong>${r.ws}m/s</strong></div><div class="rec-stat">🧭 <strong>${r.wd}</strong></div><div class="rec-stat">🌡️ <strong>${r.temp}°C</strong></div><div class="rec-stat">☔ <strong>${r.rain}%</strong></div>${tide0.time ? `<div class="rec-stat">${tide0.type === '高潮' ? '🌊' : '⬇️'} <strong>${tide0.time}</strong></div>` : ''}</div><div class="rec-note">📝 ${r.spot.note}</div><div class="rec-footer"><span style="font-size:.72rem;color:var(--text2)">上限：${r.spot.max_wave_height === 99 ? '不限' : r.spot.max_wave_height + 'm'}</span><button class="btn-mini ${isFav ? 'active' : ''}" onclick="toggleFav('${r.spot.name}',this)">${isFav ? '⭐ 已收藏' : '☆ 收藏'}</button></div></div>`;
    }
    function buildRecommendationPool(all) {
      let pool = highWaveMode ? [...all.filter(r => r.spot.max_wave_height === 99), ...all.filter(r => r.spot.max_wave_height !== 99 && r.wave <= r.spot.max_wave_height).sort((a, b) => b.score - a.score)] : all.filter(r => r.score >= 3).sort((a, b) => b.score - a.score);
      if (!pool.length) pool = [...all].sort((a, b) => b.score - a.score);
      return pool;
    }
    function renderRecommendationPage(pool) {
      const total = pool.length, totalPages = Math.ceil(total / RECOMMEND_PER_PAGE);
      const picks = pool.slice(recommendationPage * RECOMMEND_PER_PAGE, (recommendationPage + 1) * RECOMMEND_PER_PAGE);
      const ranks = ['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣','9️⃣'];
      const cards = picks.map((r, i) => recommendationCard(r, ranks[i] || `${i + 1}`)).join('');
      const pager = totalPages > 1 ? `<div style="grid-column:1/-1;display:flex;align-items:center;justify-content:center;gap:12px;margin-top:10px;padding-top:12px;border-top:1px solid var(--border)"><button class="btn-mini" onclick="changeRecommendationPage(-1)" ${recommendationPage === 0 ? 'disabled style="opacity:.4;cursor:default"' : ''}>◀ 上一頁</button><span style="font-size:.8rem;color:var(--text2)">第 ${recommendationPage + 1} 頁 / 共 ${totalPages} 頁（${total} 個釣點）</span><button class="btn-mini" onclick="changeRecommendationPage(1)" ${recommendationPage >= totalPages - 1 ? 'disabled style="opacity:.4;cursor:default"' : ''}>下一頁 ▶</button></div>` : `<div style="grid-column:1/-1;text-align:center;font-size:.72rem;color:var(--text2);margin-top:6px">共 ${total} 個推薦釣點</div>`;
      document.getElementById('recommend-grid').innerHTML = cards + pager;
    }
    function renderRecommendations(all, shuffle = false) { let pool = buildRecommendationPool(all); if (shuffle) { pool = pool.sort(() => Math.random() - 0.5); recommendationPage = 0; } renderRecommendationPage(pool); }
    function changeRecommendationPage(dir) { const pool = buildRecommendationPool(recommendationPool); const totalPages = Math.ceil(pool.length / RECOMMEND_PER_PAGE); recommendationPage = Math.max(0, Math.min(totalPages - 1, recommendationPage + dir)); renderRecommendationPage(pool); }
    async function initRecommendations() {
      if (!SPOTS.length) return;
      const today = getLocalDateString();
      document.getElementById('recommend-grid').innerHTML = '<div class="loading-placeholder"><div class="spinner"></div><div>分析今日海況中...</div></div>';
      const all = await Promise.all(SPOTS.map(s => getWeather(s, today, 8, 14)));
      recommendationPool = all;
      const avg = all.reduce((sum, r) => sum + r.wave, 0) / all.length;
      highWaveMode = avg > 1.2;
      const alertBox = document.getElementById('wave-alert'), alertMsg = document.getElementById('wave-message');
      if (alertBox && alertMsg) { if (highWaveMode) { alertBox.style.display = 'flex'; alertMsg.textContent = `今日平均浪高 ${avg.toFixed(1)} m，超過 1.2m，優先推薦港區釣點！`; } else { alertBox.style.display = 'none'; } }
      recommendationPage = 0;
      renderRecommendations(all);
    }
    function refreshRecommendations() { if (recommendationPool.length) renderRecommendations(recommendationPool, true); }
    function renderSpotCard(r) {
      const isFav = FAVS.find(f => f.name === r.spot.name);
      const waveColor = r.wave > 1 ? 'color:var(--gold)' : 'color:var(--green)';
      const tideHtml = r.tides.map(t => `<div class="tide-item">${t.type === '高潮' ? '🌊' : '⬇️'} <span>${t.time}</span> ${t.type} ${t.height}m</div>`).join('');
      const tideTypeBadge = r.tideType ? `<div style="margin-bottom:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span style="font-size:.72rem;color:var(--text2)">今日潮型</span><span style="font-size:.75rem;font-weight:700;padding:2px 10px;border-radius:10px;background:rgba(0,180,216,.15);color:var(--accent);border:1px solid rgba(0,180,216,.3)">${r.tideType}</span><span style="font-size:.68rem;color:var(--text2)">作釣時段潮汐：</span></div>` : '';
      return `<div class="spot-card type-${r.spot.type}"><div class="card-header"><div><div class="card-title">${r.spot.name}</div><div class="card-meta"><span class="badge badge-${r.spot.type}">${r.spot.type}</span><span class="badge badge-area">📍 ${r.spot.area}</span>${getSuitabilityLabel(r.score)}</div></div><div class="stars">${'⭐'.repeat(r.score)}${'☆'.repeat(5 - r.score)}</div></div><div class="weather-grid"><div class="weather-item"><div>🌊</div><div class="weather-label">浪高</div><div class="weather-value" style="${waveColor}">${r.wave}m</div></div><div class="weather-item"><div>🌬️</div><div class="weather-label">風速</div><div class="weather-value">${r.ws}m/s</div></div><div class="weather-item"><div>🧭</div><div class="weather-label">風向</div><div class="weather-value">${r.wd}</div></div><div class="weather-item"><div>🌡️</div><div class="weather-label">氣溫</div><div class="weather-value">${r.temp}°C</div></div><div class="weather-item"><div>☔</div><div class="weather-label">降雨</div><div class="weather-value">${r.rain}%</div></div><div class="weather-item"><div>📏</div><div class="weather-label">浪高上限</div><div class="weather-value">${r.spot.max_wave_height === 99 ? '不限' : r.spot.max_wave_height + 'm'}</div></div></div>${tideTypeBadge}<div class="tide-row">${tideHtml}</div><div class="result-note">📝 ${r.spot.note}</div><div class="wind-note">✅ 適合：${(r.spot.good_wind_directions || []).join('、')}${r.spot.bad_wind_directions?.length ? '　❌ 避免：' + r.spot.bad_wind_directions.join('、') : ''}</div><div class="card-footer"><button class="btn-mini ${isFav ? 'active' : ''}" onclick="toggleFav('${r.spot.name}',this)">${isFav ? '⭐ 已收藏' : '☆ 加入最愛'}</button><button class="btn-mini" onclick="openMap(${r.spot.lat},${r.spot.lng})">🗺️ 地圖</button></div></div>`;
    }
    function renderResults(results, total, overnight, date, startHour, endDate, endHour) {
      const hs = String(startHour).padStart(2, '0'), he = String(endHour).padStart(2, '0');
      document.getElementById('results-count').innerHTML = `${date} ${hs}:00 ～ ${endDate} ${he}:00${overnight ? ' 🌙' : ''}　共 <strong>${results.length}</strong> 個適合釣點（篩掉 ${total - results.length} 個）`;
      if (!results.length) { document.getElementById('results-grid').innerHTML = '<div class="loading-placeholder"><div style="font-size:2rem;margin-bottom:8px">🙁</div><div>今日條件下無合適釣點</div></div>'; return; }
      document.getElementById('results-grid').innerHTML = results.map(renderSpotCard).join('');
    }
    async function searchSpots() {
      const date = document.getElementById('input-date')?.value;
      if (!date) { showToast('❌ 請選擇出發日期', true); return; }
      if (!SPOTS.length) { showToast('❌ 尚未載入釣點資料', true); return; }
      const startHour = parseInt(document.getElementById('input-time-start')?.value ?? '6', 10);
      const endHour = parseInt(document.getElementById('input-time-end')?.value ?? '12', 10);
      const endDate = document.getElementById('input-date-end')?.value || date;
      const overnight = endDate > date || endHour < startHour;
      const selectedAreas = [...document.querySelectorAll('#area-chips .chip.active')].map(c => c.dataset.area);
      const selectedType = document.querySelector('.type-chips .chip.active')?.dataset.type || 'all';
      const favOnly = document.getElementById('fav-only')?.checked;
      const filtered = SPOTS.filter(s => { if (favOnly && !FAVS.find(f => f.name === s.name)) return false; if (!selectedAreas.includes('all') && !selectedAreas.includes(s.area)) return false; if (selectedType !== 'all' && s.type !== selectedType) return false; return true; });
      const section = document.getElementById('results-section');
      section.style.display = 'block';
      document.getElementById('results-grid').innerHTML = `<div class="loading-placeholder"><div class="spinner"></div><div>查詢 ${filtered.length} 個釣點天氣中...</div></div>`;
      section.scrollIntoView({ behavior:'smooth', block:'start' });
      const results = await Promise.all(filtered.map(s => getWeather(s, date, startHour, endHour)));
      const suitable = results.filter(r => r.spot.max_wave_height === 99 || r.wave <= r.spot.max_wave_height);
      currentResults = suitable.sort((a, b) => b.score - a.score);
      renderResults(currentResults, results.length, overnight, date, startHour, endDate, endHour);
    }
    function sortResults() { const method = document.getElementById('sort-select')?.value; const s = [...currentResults]; if (method === 'score') s.sort((a, b) => b.score - a.score); if (method === 'wave') s.sort((a, b) => a.wave - b.wave); if (method === 'name') s.sort((a, b) => a.spot.name.localeCompare(b.spot.name)); currentResults = s; document.getElementById('results-grid').innerHTML = s.map(renderSpotCard).join(''); }
    function toggleFav(name, btn) { const idx = FAVS.findIndex(f => f.name === name); if (idx >= 0) { FAVS.splice(idx, 1); if (btn) { btn.textContent = '☆ 加入最愛'; btn.classList.remove('active'); } showToast('已移除最愛'); } else { if (FAVS.length >= 10) { showToast('❌ 最多收藏 10 個', true); return; } const sp = SPOTS.find(s => s.name === name); if (sp) FAVS.push(sp); if (btn) { btn.textContent = '⭐ 已收藏'; btn.classList.add('active'); } showToast('已加入最愛 ⭐'); } localStorage.setItem('favSpots', JSON.stringify(FAVS)); renderFavList(); }
    function removeFav(name) { FAVS = FAVS.filter(f => f.name !== name); localStorage.setItem('favSpots', JSON.stringify(FAVS)); renderFavList(); }
    function renderFavList() { const ul = document.getElementById('fav-list'); if (!ul) return; if (!FAVS.length) { ul.innerHTML = '<li class="fav-empty">尚未收藏任何釣點</li>'; return; } ul.innerHTML = FAVS.map(s => `<li><span style="flex:1">${s.name}</span><span class="fav-area">${s.area}</span><button class="fav-del" onclick="removeFav('${s.name}')">✕</button></li>`).join(''); }
    async function loadSpots() {
      try {
        const res = await fetch('./spots.json');
        if (!res.ok) throw new Error('spots.json 載入失敗');
        SPOTS = await res.json();
      } catch (e) {
        console.error('讀取 spots.json 失敗:', e);
        SPOTS = DEFAULT_SPOTS;
        showToast('❌ spots.json 載入失敗', true);
      }
      const spotsNum = document.getElementById('spots-num');
      if (spotsNum) spotsNum.textContent = SPOTS.length;
      initRecommendations();
    }
    function initPage() {
      const today = getLocalDateString();
      const dateStart = document.getElementById('input-date');
      const dateEnd = document.getElementById('input-date-end');
      if (dateStart) dateStart.value = today;
      if (dateEnd) dateEnd.value = today;
      fillHourOptions('input-time-start', 6);
      fillHourOptions('input-time-end', 12);
      initAreaChips();
      initTypeChips();
      renderFavList();
      loadSpots();
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initPage); else initPage();
  </script>
</body>
</html>
