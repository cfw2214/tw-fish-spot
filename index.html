<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fish Point</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0a1628 0%, #0d3b6e 50%, #1a6b9a 100%);
      min-height: 100vh;
      color: #fff;
      overflow-x: hidden;
    }
    header {
      text-align: center;
      padding: 60px 20px 40px;
    }
    header h1 {
      font-size: 3rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(100,200,255,0.8);
      margin-bottom: 10px;
    }
    header p {
      font-size: 1.1rem;
      color: #a0d8ef;
      letter-spacing: 2px;
    }
    .fish-container {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }
    .fish-svg {
      animation: swim 4s ease-in-out infinite;
      filter: drop-shadow(0 0 15px rgba(64,180,255,0.7));
    }
    @keyframes swim {
      0%, 100% { transform: translateX(0) rotate(0deg); }
      25% { transform: translateX(20px) rotate(3deg); }
      75% { transform: translateX(-20px) rotate(-3deg); }
    }
    .bubbles {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 40px;
    }
    .bubble {
      width: 12px;
      height: 12px;
      background: rgba(255,255,255,0.3);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 50%;
      animation: rise 3s ease-in infinite;
    }
    .bubble:nth-child(2) { animation-delay: 0.5s; width: 8px; height: 8px; }
    .bubble:nth-child(3) { animation-delay: 1s; width: 14px; height: 14px; }
    .bubble:nth-child(4) { animation-delay: 1.5s; }
    .bubble:nth-child(5) { animation-delay: 2s; width: 10px; height: 10px; }
    @keyframes rise {
      0% { transform: translateY(0); opacity: 0.8; }
      100% { transform: translateY(-60px); opacity: 0; }
    }
    .info-section {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px 40px 60px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }
    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 28px 24px;
      text-align: center;
      backdrop-filter: blur(8px);
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 10px 30px rgba(0,150,255,0.3);
    }
    .card .icon { font-size: 2.5rem; margin-bottom: 12px; }
    .card h3 { font-size: 1.1rem; margin-bottom: 8px; color: #7dd3fc; }
    .card p { font-size: 0.9rem; color: #c0e0f5; line-height: 1.6; }
    footer {
      text-align: center;
      padding: 20px;
      color: rgba(255,255,255,0.4);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Fish Point</h1>
    <p>探索海洋的每一個角落</p>
  </header>

  <div class="fish-container">
    <svg class="fish-svg" width="200" height="120" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
      <!-- Tail -->
      <polygon points="20,60 60,35 60,85" fill="#1e90ff" opacity="0.85"/>
      <!-- Body -->
      <ellipse cx="110" cy="60" rx="70" ry="38" fill="#40b4ff"/>
      <!-- Belly sheen -->
      <ellipse cx="115" cy="68" rx="50" ry="20" fill="#7dd3fc" opacity="0.35"/>
      <!-- Fin top -->
      <polygon points="90,22 130,22 110,50" fill="#1e90ff" opacity="0.75"/>
      <!-- Fin bottom -->
      <polygon points="90,98 130,98 110,72" fill="#1e90ff" opacity="0.6"/>
      <!-- Eye -->
      <circle cx="162" cy="52" r="9" fill="white"/>
      <circle cx="164" cy="51" r="5" fill="#1a3a5c"/>
      <circle cx="165" cy="50" r="2" fill="white"/>
      <!-- Scales -->
      <path d="M90,50 Q100,40 110,50" stroke="#1e90ff" stroke-width="1.5" fill="none" opacity="0.5"/>
      <path d="M110,50 Q120,40 130,50" stroke="#1e90ff" stroke-width="1.5" fill="none" opacity="0.5"/>
      <path d="M90,65 Q100,55 110,65" stroke="#1e90ff" stroke-width="1.5" fill="none" opacity="0.5"/>
      <path d="M110,65 Q120,55 130,65" stroke="#1e90ff" stroke-width="1.5" fill="none" opacity="0.5"/>
    </svg>
  </div>

  <div class="bubbles">
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
  </div>

  <div class="info-section">
    <div class="card">
      <div class="icon">🐟</div>
      <h3>魚類百科</h3>
      <p>探索各種海洋魚類的習性、分佈與特徵</p>
    </div>
    <div class="card">
      <div class="icon">🌊</div>
      <h3>海洋生態</h3>
      <p>了解海洋生態系統的平衡與保護</p>
    </div>
    <div class="card">
      <div class="icon">📍</div>
      <h3>釣點地圖</h3>
      <p>標記與分享你最喜愛的釣魚地點</p>
    </div>
  </div>

  <footer>
    &copy; 2026 Fish Point. All rights reserved.
  </footer>
</body>
</html>
