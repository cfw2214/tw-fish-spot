<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎣 北台灣海釣天氣助理by我是黑叔｜版本 V0.2.8</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0a1628;--bg2:#0f2040;--card:#132545;--card2:#1a3060;--accent:#00b4d8;--accent2:#0077b6;--gold:#f4a261;--green:#2ec4b6;--red:#e63946;--text:#e0f0ff;--text2:#8ab4cc;--border:#1e3a5f;--radius:12px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    header{background:linear-gradient(135deg,var(--bg2),var(--accent2));padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--accent);position:sticky;top:0;z-index:100}
    header h1{font-size:1.1rem;font-weight:700;letter-spacing:1px;position:absolute;left:50%;transform:translateX(-50%);margin:0;white-space:nowrap} header h1 span{color:var(--accent)}
    .header-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;margin-left:auto}
    #hamburger{display:none;background:none;border:none;color:var(--text);font-size:1.5rem;cursor:pointer}
    .main-wrap{display:flex;max-width:1300px;margin:0 auto}
    #sidebar{width:270px;min-width:270px;background:var(--bg2);border-right:1px solid var(--border);padding:20px 16px;display:flex;flex-direction:column;gap:20px;min-height:calc(100vh - 60px)}
    .sidebar-section h3{font-size:.75rem;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:6px}
    #fav-list{list-style:none;display:flex;flex-direction:column;gap:6px}
    #fav-list li{background:var(--card);border-radius:8px;padding:8px 10px;font-size:.82rem;display:flex;align-items:center;justify-content:space-between;border:1px solid var(--border)}
    .fav-area{color:var(--text2);font-size:.72rem;margin-left:4px}.fav-del{color:var(--red);background:none;border:none;cursor:pointer;font-size:.9rem}.fav-empty{color:var(--text2);font-size:.8rem;padding:8px 0}
    #main-content{flex:1;padding:20px;overflow:hidden}
    .filter-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:24px}
    .filter-box h2{font-size:.9rem;color:var(--accent);margin-bottom:14px;letter-spacing:1px}
    .filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .filter-group{display:flex;flex-direction:column;gap:5px}.filter-group label{font-size:.78rem;color:var(--text2)}
    .filter-group input,.filter-group select{background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 10px;font-size:.85rem;font-family:inherit;outline:none;width:100%}
    .filter-row-full{grid-column:1/-1}
    .chip{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:.78rem;cursor:pointer;transition:all .2s;user-select:none}
    .chip.active{background:var(--accent2);border-color:var(--accent);color:#fff}
    .area-chips,.type-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
    .btn-search{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;border:none;border-radius:25px;padding:10px 30px;font-size:.95rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px}
    .btn-mini{background:none;border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:5px 12px;font-size:.75rem;cursor:pointer}.btn-mini.active{border-color:var(--gold);color:var(--gold)}
    #recommend-section{margin-bottom:28px}.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .section-title{font-size:1rem;font-weight:700;display:flex;align-items:center;gap:8px}.badge-new{background:var(--gold);color:#1a1a2e;font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:10px}
    .wave-alert{background:rgba(230,57,70,.12);border:1px solid rgba(230,57,70,.4);border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:.82rem;color:#ff8fa3;display:flex;align-items:center;gap:8px}
    #recommend-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
    .rec-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;position:relative;overflow:hidden}
    .rec-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,var(--accent2),var(--accent))}
    .rec-card.type-野場::before{background:linear-gradient(90deg,#c77b30,var(--gold))}.rec-card.type-肉粽::before{background:linear-gradient(90deg,#1d8a82,var(--green))}
    .rec-rank{position:absolute;top:12px;right:12px;font-size:1.4rem;opacity:.6}.rec-name{font-size:.95rem;font-weight:700;margin-bottom:6px;padding-right:30px}
    .rec-meta{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}.badge{font-size:.65rem;padding:2px 7px;border-radius:10px;font-weight:700}
    .badge-野場{background:rgba(244,162,97,.2);color:var(--gold);border:1px solid rgba(244,162,97,.4)}.badge-肉粽{background:rgba(46,196,182,.2);color:var(--green);border:1px solid rgba(46,196,182,.4)}.badge-area{background:rgba(0,180,216,.15);color:var(--accent);border:1px solid rgba(0,180,216,.3)}
    .suitability{font-size:.72rem;padding:3px 10px;border-radius:10px;font-weight:700}.suit-great{background:rgba(46,196,182,.2);color:var(--green);border:1px solid rgba(46,196,182,.4)}.suit-ok{background:rgba(244,162,97,.2);color:var(--gold);border:1px solid rgba(244,162,97,.4)}.suit-bad{background:rgba(230,57,70,.2);color:var(--red);border:1px solid rgba(230,57,70,.4)}
    .score-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:10px}.score-bar-fill{height:100%;border-radius:2px}
    .rec-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:8px}.rec-stat{font-size:.78rem;color:var(--text2)}.rec-stat strong{color:var(--text)}
    .tide-mini{background:var(--card2);border-radius:8px;padding:8px;display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:10px}
    .tide-mini div{font-size:.75rem;color:var(--text2)} .tide-mini strong{color:var(--text)}
    .rec-note{font-size:.72rem;color:var(--text2);margin-bottom:10px}.rec-footer{display:flex;justify-content:space-between;align-items:center}
    .loading-placeholder{text-align:center;color:var(--text2);padding:50px 20px;grid-column:1/-1}.spinner{display:inline-block;width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:12px auto}
    .sponsor-bar{max-width:1300px;margin:20px auto 0;padding:0 20px}.sponsor-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px}.sponsor-title{font-size:.82rem;color:var(--accent);letter-spacing:1px;margin-bottom:10px}.sponsor-banner{width:100%;background:linear-gradient(135deg,var(--card),var(--card2));border:1px dashed var(--accent);border-radius:12px;padding:18px 16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:120px;text-align:center}.sponsor-banner div{font-size:1rem;color:var(--text);letter-spacing:1px}.sponsor-banner div:nth-child(2){font-size:1.1rem;color:var(--gold);font-weight:700}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:768px){#hamburger{display:block}.header-actions{display:none}#sidebar{position:fixed;left:-290px;top:0;height:100vh;z-index:150;transition:left .3s;padding-top:70px}#sidebar.open{left:0}.filter-grid{grid-template-columns:1fr}#recommend-grid{grid-template-columns:1fr}.sponsor-banner{min-height:108px;padding:16px 12px}.sponsor-banner div{font-size:.95rem}}
  </style>
</head>
<body>
  <header>
    <button id="hamburger" onclick="toggleSidebar()">☰</button>
    <h1>🎣 北台灣<span>海釣天氣</span>助理by我是黑叔</h1>
    <div class="header-actions">
      <button class="btn-mini" onclick="addFavoritePrompt()">⭐ 加入最愛</button>
    </div>
  </header>
  <div id="sb-overlay" style="display:none;position:fixed;inset:0;z-index:140;background:rgba(0,0,0,.5)" onclick="toggleSidebar()"></div>
  <div class="main-wrap">
    <aside id="sidebar">
      <div class="sidebar-section">
        <h3>⭐ 我的最愛釣點</h3>
        <ul id="fav-list"><li class="fav-empty">尚未收藏任何釣點</li></ul>
        <div style="font-size:.7rem;color:var(--text2);margin-top:8px">最多收藏 10 個</div>
      </div>
      <div class="sidebar-section">
        <h3>📊 釣點統計</h3>
        <div style="font-size:.78rem;color:var(--text2)">已載入 <span id="spots-num" style="color:var(--accent);font-weight:700">0</span> 個釣點</div>
      </div>
    </aside>
    <main id="main-content">
      <div class="filter-box">
        <h2>🔍 篩選條件</h2>
        <div class="filter-grid">
          <div class="filter-group">
            <label>📅 作釣日期</label>
            <input type="date" id="input-date" onchange="syncEndDate()">
          </div>
          <div class="filter-group">
            <label>🕐 作釣開始時間（24小時）</label>
            <select id="input-time-start"></select>
          </div>
          <div class="filter-group">
            <label>📅 結束日期（跨夜可修改）</label>
            <input type="date" id="input-date-end">
          </div>
          <div class="filter-group">
            <label>🕛 預計結束時間（24小時）</label>
            <select id="input-time-end"></select>
          </div>
          <div class="filter-group filter-row-full">
            <label>📍 大區域（可多選）</label>
            <div class="area-chips" id="area-chips">
              <div class="chip active" data-area="all">全部北台灣</div>
              <div class="chip" data-area="基隆區">基隆區</div>
              <div class="chip" data-area="東北角區">東北角區</div>
              <div class="chip" data-area="北海岸區">北海岸區</div>
            </div>
          </div>
          <div class="filter-group filter-row-full">
            <label>🎣 釣點類型</label>
            <div class="type-chips">
              <div class="chip active" data-type="all">全部</div>
              <div class="chip" data-type="野場">🏔️ 野場</div>
              <div class="chip" data-type="港區">⚓ 港區內</div>
            </div>
          </div>
          <div class="filter-group filter-row-full" style="flex-direction:row;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
            <button class="btn-search" onclick="searchSpots()">🎣 海釣點推薦</button>
            <span style="font-size:.75rem;color:var(--text2);margin-left:10px;">當浪高超過1.2m就不顯示推薦野場，港區內做釣則不受浪高限制</span>
            <label style="font-size:.82rem;color:var(--text2);display:flex;align-items:center;gap:8px;cursor:pointer;">
              <input type="checkbox" id="fav-only" style="accent-color:var(--gold);width:16px;height:16px;cursor:pointer;"> 只看我的最愛
            </label>
          </div>
        </div>
      </div>
      <section id="recommend-section">
        <div class="section-header">
          <div class="section-title">🎯 今日推薦釣點 <span class="badge-new">LIVE</span></div>
          <button class="btn-mini" onclick="refreshRecommendations()">🔄 換一批</button>
        </div>
        <div id="wave-alert" class="wave-alert" style="display:none;">🌊 <span id="wave-message"></span></div>
        <div id="recommend-grid"><div class="loading-placeholder"><div class="spinner"></div><div>分析今日海況中...</div></div></div>
      </section>
    </main>
  </div>
  <div class="sponsor-bar">
    <div class="sponsor-box">
      <div class="sponsor-title">🤝 廠商贊助名單</div>
      <div class="sponsor-banner" id="sponsor-list">
        <div>歡迎贊助廣告</div>
        <div>歡迎贊助廣告</div>
        <div>歡迎贊助廣告</div>
      </div>
    </div>
  </div>
  <footer style="text-align:center;padding:18px 20px;margin-top:20px;border-top:1px solid var(--border);color:var(--text2);font-size:.75rem;background:var(--bg2)">北台灣海釣天氣助理by我是黑叔｜版本 V0.2.8</footer>
  <script>
    const CWA_KEY='CWA-668A5759-9FC3-4C75-91A3-F84C27565A7A';
    const DEFAULT_SPOTS=[];
    let SPOTS=[];
    let FAVS=JSON.parse(localStorage.getItem('favSpots')||'[]');
    let recommendationPool=[];
    let recommendationPage=0;
    const RECOMMEND_PER_PAGE=9;
    let deferredPrompt=null;

    function getTWDateString(){
      const now=new Date();
      const tw=new Date(now.toLocaleString('en-US',{timeZone:'Asia/Taipei'}));
      const y=tw.getFullYear();
      const m=String(tw.getMonth()+1).padStart(2,'0');
      const d=String(tw.getDate()).padStart(2,'0');
      return `${y}-${m}-${d}`;
    }
    function shuffleArray(array){const arr=[...array];for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}
    function fillHourOptions(selectId,defaultHour){const el=document.getElementById(selectId);if(!el||el.options.length>0)return;for(let i=0;i<24;i++){const opt=document.createElement('option');opt.value=String(i).padStart(2,'0');opt.textContent=String(i).padStart(2,'0')+':00';if(i===defaultHour)opt.selected=true;el.appendChild(opt)}}
    function syncEndDate(){const start=document.getElementById('input-date');const end=document.getElementById('input-date-end');if(!start||!end)return;if(!end.value||end.value<start.value)end.value=start.value}
    function initAreaChips(){const chips=document.querySelectorAll('#area-chips .chip');const allChip=document.querySelector('#area-chips .chip[data-area="all"]');chips.forEach(chip=>{chip.onclick=()=>{if(chip.dataset.area==='all'){chips.forEach(c=>c.classList.remove('active'));chip.classList.add('active')}else{if(allChip)allChip.classList.remove('active');chip.classList.toggle('active');const anyActive=[...document.querySelectorAll('#area-chips .chip:not([data-area="all"])')].some(c=>c.classList.contains('active'));if(!anyActive&&allChip)allChip.classList.add('active')}}})}
    function initTypeChips(){const chips=document.querySelectorAll('.type-chips .chip');chips.forEach(chip=>{chip.onclick=()=>{chips.forEach(c=>c.classList.remove('active'));chip.classList.add('active')}})}
    function toggleSidebar(){const sb=document.getElementById('sidebar');const ov=document.getElementById('sb-overlay');if(!sb||!ov)return;sb.classList.toggle('open');ov.style.display=sb.classList.contains('open')?'block':'none'}
    function openMap(lat,lng){window.open(`https://www.google.com/maps?q=${lat},${lng}`,'_blank')}
    function addFavoritePrompt(){
      const ua=navigator.userAgent;
      if(/Mac|iPhone|iPad|iPod/i.test(ua)) showToast('請按 Command + D 加入最愛');
      else showToast('請按 Ctrl + D 加入最愛');
    }
    window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;const btn=document.getElementById('install-btn');if(btn)btn.style.display='inline-flex';});
    async function installApp(){
      if(deferredPrompt){
        deferredPrompt.prompt();
        const choice=await deferredPrompt.userChoice;
        deferredPrompt=null;
        if(choice.outcome==='accepted') showToast('已送出新增到桌面提示');
        else showToast('已取消新增到桌面');
      }else{
        const ua=navigator.userAgent.toLowerCase();
        if(/iphone|ipad|ipod/.test(ua)) showToast('iPhone/iPad 請按分享後選「加入主畫面」');
        else showToast('請使用瀏覽器安裝功能新增到桌面');
      }
    }
    window.addEventListener('appinstalled',()=>{showToast('已安裝到桌面');const btn=document.getElementById('install-btn');if(btn)btn.style.display='none';});
    function showToast(msg,isError=false){const t=document.createElement('div');t.textContent=msg;t.style.cssText=`position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:${isError?'var(--red)':'var(--accent2)'};color:#fff;padding:10px 20px;border-radius:20px;font-size:.85rem;z-index:999`;document.body.appendChild(t);setTimeout(()=>t.remove(),2500)}
    function degToDir(deg){return['北','東北','東','東南','南','西南','西','西北'][Math.round(deg/45)%8]}
    function msToBeaufort(ms){const scale=[0.3,1.6,3.4,5.5,8.0,10.8,13.9,17.2,20.8,24.5,28.5,32.7];for(let i=0;i<scale.length;i++){if(ms<scale[i])return i}return 12}
    function getSuitabilityLabel(score){if(score>=4)return '<span class="suitability suit-great">✅ 適合出釣</span>';if(score>=3)return '<span class="suitability suit-ok">⚠️ 尚可</span>';return '<span class="suitability suit-bad">❌ 不建議</span>'}
    function calcScore(spot,wave,beaufort,windDir){let s=5;const max=spot.max_wave_height===99?999:spot.max_wave_height;if(wave>max)s-=3;else if(wave>max*0.8)s-=1;if(beaufort>5)s-=3;else if(beaufort>3)s-=1;if(windDir&&spot.bad_wind_directions?.includes(windDir))s-=1;if(windDir&&spot.good_wind_directions?.includes(windDir))s+=1;return Math.max(1,Math.min(5,s))}
    function mockTides(){const r=()=>String(Math.floor(Math.random()*59)).padStart(2,'0');return[{time:`03:${r()}`,type:'低潮',height:(Math.random()*.4+.2).toFixed(1)},{time:`09:${r()}`,type:'高潮',height:(Math.random()*.6+1.4).toFixed(1)},{time:`15:${r()}`,type:'低潮',height:(Math.random()*.4+.2).toFixed(1)},{time:`21:${r()}`,type:'高潮',height:(Math.random()*.6+1.4).toFixed(1)}]}
    async function getWeather(spot,date,startHour,endHour){
      try{
        const [marineRes,weatherRes]=await Promise.all([
          fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=${spot.lat}&longitude=${spot.lng}&hourly=wave_height,wave_direction&timezone=Asia%2FTaipei&start_date=${date}&end_date=${date}`),
          fetch(`https://api.open-meteo.com/v1/forecast?latitude=${spot.lat}&longitude=${spot.lng}&hourly=temperature_2m,precipitation_probability,windspeed_10m,winddirection_10m&timezone=Asia%2FTaipei&start_date=${date}&end_date=${date}`)
        ]);
        const m=await marineRes.json(); const w=await weatherRes.json(); const h=startHour;
        const wave=parseFloat(((m.hourly?.wave_height?.[h]??0.8)).toFixed(1));
        const wsKm=w.hourly?.windspeed_10m?.[h]??0; const ws=parseFloat((wsKm/3.6).toFixed(1));
        const wdDeg=w.hourly?.winddirection_10m?.[h]??0; const temp=Math.round(w.hourly?.temperature_2m?.[h]??22); const rain=Math.round(w.hourly?.precipitation_probability?.[h]??0);
        let tides=mockTides(); let tideType='';
        try{
          const tr=await fetch(`https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-A0021-001?Authorization=${CWA_KEY}&format=JSON&Date=${date}`);
          const td=await tr.json(); const recs=td?.records?.TideForecasts;
          console.log('🔍 潮汐API回應:', td); // 除錯：查看完整回应
          if(recs?.length){
            const daily=recs[0]?.Location?.TimePeriods?.Daily?.find(d=>d.Date===date);
            console.log('📅 日期匹配到的daily:', daily); // 除錯：查看daily物件
            if(daily?.TideRange){
              tideType = '潮差：' + daily.TideRange;
              console.log('🌊 潮差:', tideType, '(原始值:', daily.TideRange, ')');
            }else{
              console.log('⚠️ daily.TideRange 不存在');
            }
            if(daily?.HourlyTides?.length){
              const list=[];
              for(let i=0;i<daily.HourlyTides.length;i++){
                const cur=daily.HourlyTides[i];
                list.push({time:cur.DateTime.split('T')[1].substring(0,5),type:cur.TideType==='H'?'高潮':'低潮',height:parseFloat(cur.TideHeights?.AboveChartDatum??0).toFixed(1)});
              }
              if(list.length)tides=list.slice(0,4);
            }
          }else{
            console.log('❌ recs 不存在或為空');
          }
        }catch(e){console.error('潮汐API錯誤:',e)}
        const wd=degToDir(wdDeg);
        return {spot,wave,ws,wd,temp,rain,tides,tideType,score:calcScore(spot,wave,msToBeaufort(ws),wd),source:'live'};
      }catch(e){
        return {spot,wave:0.8,ws:2.1,wd:'北',temp:22,rain:0,tides:mockTides(),tideType:'中潮',score:4,source:'demo'};
      }
    }
    function recommendationCard(r,rank){
      const isFav=FAVS.find(f=>f.name===r.spot.name);const max=r.spot.max_wave_height===99?999:r.spot.max_wave_height;
      const waveColor=r.wave>max?'color:var(--red)':r.wave>1?'color:var(--gold)':'color:var(--green)';const barColor=r.score>=4?'var(--green)':r.score>=3?'var(--gold)':'var(--red)';
      const tideHtml=(r.tides||[]).slice(0,4).map(t=>`<div>${t.type==='高潮'?'滿頂⬆️':'潮底⬇️'} <strong>${t.time}</strong></div>`).join('');
      const typeLabel = r.spot.type === '港區' ? '港區內' : r.spot.type;
      return `<div class="rec-card type-${r.spot.type}"><div class="rec-rank">${rank}</div><div class="rec-name">${r.spot.name}</div><div class="rec-meta"><span class="badge badge-${r.spot.type}">${typeLabel}</span><span class="badge badge-area">📍 ${r.spot.area}</span>${getSuitabilityLabel(r.score)}</div><div class="score-bar"><div class="score-bar-fill" style="width:${r.score*20}%;background:${barColor}"></div></div><div class="rec-stats"><div class="rec-stat">🌬️ <strong>${msToBeaufort(r.ws)}級風</strong></div><div class="rec-stat">💨 <strong>${r.wd}</strong></div><div class="rec-stat">🌙 <strong>${r.tideType||'潮汐'}</strong></div><div class="rec-stat">浪高🌊 <strong style="${waveColor}">${r.wave}m</strong></div></div><div class="tide-mini">${tideHtml}</div><div class="rec-note">📝 ${r.spot.note}</div><div class="rec-footer"><span style="font-size:.72rem;color:var(--text2)">上限：${r.spot.max_wave_height===99?'不限':r.spot.max_wave_height+'m'}</span><button class="btn-mini ${isFav?'active':''}" onclick="toggleFav('${r.spot.name}',this)">${isFav?'⭐ 已收藏':'☆ 收藏'}</button></div></div>`;
    }
    function renderRecommendationPage(pool){
      const total=pool.length,totalPages=Math.ceil(total/RECOMMEND_PER_PAGE),picks=pool.slice(recommendationPage*RECOMMEND_PER_PAGE,(recommendationPage+1)*RECOMMEND_PER_PAGE);
      const ranks=['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣','9️⃣'];
      const cards=picks.map((r,i)=>recommendationCard(r,ranks[i]||`${i+1}`)).join('');
      const pager=totalPages>1?`<div style="grid-column:1/-1;display:flex;align-items:center;justify-content:center;gap:12px;margin-top:10px;padding-top:12px;border-top:1px solid var(--border)"><button class="btn-mini" onclick="changeRecommendationPage(-1)" ${recommendationPage===0?'disabled style="opacity:.4;cursor:default"':''}>◀ 上一頁</button><span style="font-size:.8rem;color:var(--text2)">第 ${recommendationPage+1} 頁 / 共 ${totalPages} 頁（${total} 個釣點）</span><button class="btn-mini" onclick="changeRecommendationPage(1)" ${recommendationPage>=totalPages-1?'disabled style="opacity:.4;cursor:default"':''}>下一頁 ▶</button></div>`:'';
      document.getElementById('recommend-grid').innerHTML=cards+pager;
    }
    function changeRecommendationPage(dir){const totalPages=Math.ceil(recommendationPool.length/RECOMMEND_PER_PAGE);recommendationPage=Math.max(0,Math.min(totalPages-1,recommendationPage+dir));renderRecommendationPage(recommendationPool)}
    function refreshRecommendations(){if(recommendationPool.length){recommendationPool=shuffleArray(recommendationPool);recommendationPage=0;renderRecommendationPage(recommendationPool)}}
    async function initRecommendations(){
      if(!SPOTS.length){document.getElementById('recommend-grid').innerHTML='<div class="loading-placeholder">目前沒有可用釣點資料</div>';return;}
      const today=getTWDateString();
      document.getElementById('recommend-grid').innerHTML='<div class="loading-placeholder"><div class="spinner"></div><div>分析今日海況中...</div></div>';
      const all=await Promise.all(SPOTS.map(s=>getWeather(s,today,8,14)));
      const valid=all.filter(r=>r.score>=3||r.spot.max_wave_height===99);
      recommendationPool=shuffleArray(valid).slice(0,3);
      recommendationPage=0;
      if(!recommendationPool.length){document.getElementById('recommend-grid').innerHTML='<div class="loading-placeholder">目前沒有推薦釣點</div>';return;}
      renderRecommendationPage(recommendationPool);
    }
    async function searchSpots(){
      const date=document.getElementById('input-date')?.value;
      if(!date){showToast('❌ 請選擇出發日期',true);return}
      if(!SPOTS.length){showToast('❌ 尚未載入釣點資料',true);return}
      const startHour=parseInt(document.getElementById('input-time-start')?.value??'6',10);
      const endHour=parseInt(document.getElementById('input-time-end')?.value??'12',10);
      let selectedAreas=[...document.querySelectorAll('#area-chips .chip.active')].map(c=>c.dataset.area);
      // 防禦：如果未選擇任何區域，預設為全部
      if(selectedAreas.length===0){
        console.warn('searchSpots: 未檢測到區域選擇，預設為全部北台灣');
        selectedAreas=['all'];
      }
      const selectedType=document.querySelector('.type-chips .chip.active')?.dataset.type||'all';
      const favOnly=document.getElementById('fav-only')?.checked;
      const filtered=SPOTS.filter(s=>{if(favOnly&&!FAVS.find(f=>f.name===s.name))return false;if(!selectedAreas.includes('all')&&!selectedAreas.includes(s.area))return false;if(selectedType!=='all'&&s.type!==selectedType)return false;return true});
      console.log('搜索條件→ 區域:',selectedAreas,'類型:',selectedType,'最愛only:',favOnly,'符合條件的釣點數:',filtered.length,'名單:',filtered.map(s=>s.name));
      document.getElementById('recommend-grid').innerHTML=`<div class="loading-placeholder"><div class="spinner"></div><div>查詢 ${filtered.length} 個釣點天氣中...</div></div>`;
      const results=await Promise.all(filtered.map(s=>getWeather(s,date,startHour,endHour)));
      recommendationPool=results.filter(r=>r.spot.max_wave_height===99||r.wave<=r.spot.max_wave_height).sort((a,b)=>b.score-a.score);
      recommendationPage=0;
      if(!recommendationPool.length){document.getElementById('recommend-grid').innerHTML='<div class="loading-placeholder"><div style="font-size:2rem;margin-bottom:8px">🙁</div><div>目前條件下沒有合適釣點</div></div>';return}
      renderRecommendationPage(recommendationPool);
      document.getElementById('recommend-section').scrollIntoView({behavior:'smooth',block:'start'});
    }
    function toggleFav(name,btn){const idx=FAVS.findIndex(f=>f.name===name);if(idx>=0){FAVS.splice(idx,1);if(btn){btn.textContent='☆ 收藏';btn.classList.remove('active')}showToast('已移除最愛')}else{if(FAVS.length>=10){showToast('❌ 最多收藏 10 個',true);return}const sp=SPOTS.find(s=>s.name===name);if(sp)FAVS.push(sp);if(btn){btn.textContent='⭐ 已收藏';btn.classList.add('active')}showToast('已加入最愛 ⭐')}localStorage.setItem('favSpots',JSON.stringify(FAVS));renderFavList()}
    function removeFav(name){FAVS=FAVS.filter(f=>f.name!==name);localStorage.setItem('favSpots',JSON.stringify(FAVS));renderFavList()}
    function renderFavList(){const ul=document.getElementById('fav-list');if(!ul)return;if(!FAVS.length){ul.innerHTML='<li class="fav-empty">尚未收藏任何釣點</li>';return}ul.innerHTML=FAVS.map(s=>`<li><span style="flex:1">${s.name}</span><span class="fav-area">${s.area}</span><button class="fav-del" onclick="removeFav('${s.name}')">✕</button></li>`).join('')}
    async function loadSpots(){try{const res=await fetch('./spots.json');if(!res.ok)throw new Error('spots.json 載入失敗');SPOTS=await res.json()}catch(e){console.error('讀取 spots.json 失敗:',e);SPOTS=DEFAULT_SPOTS;showToast('❌ spots.json 載入失敗',true)}const spotsNum=document.getElementById('spots-num');if(spotsNum)spotsNum.textContent=SPOTS.length;await initRecommendations()}
    function initPage(){const today=getTWDateString();const dateStart=document.getElementById('input-date');const dateEnd=document.getElementById('input-date-end');if(dateStart)dateStart.value=today;if(dateEnd)dateEnd.value=today;const twNow=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Taipei'}));const startHour=twNow.getHours();const endHour=(startHour+4)%24;fillHourOptions('input-time-start',startHour);fillHourOptions('input-time-end',endHour);initAreaChips();initTypeChips();renderFavList();loadSpots()}
    if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',initPage);else initPage();
  </script>
</body>
</html>
